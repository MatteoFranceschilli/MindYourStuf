const DAYS   = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
function getOccurrences(year, month, wd) {
  const jsDay = wd===6?0:wd+1, out=[], d=new Date(year,month,1);
  while(d.getMonth()===month){if(d.getDay()===jsDay)out.push(isoDate(d));d.setDate(d.getDate()+1);}
  return out;
}
function fmtDate(iso) {
  const d=new Date(iso+"T12:00:00");
  return `${["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
const uid = () => Math.random().toString(36).slice(2,11);

// ─── STYLES ──────────────────────────────────────────────────────────────────
function mkS(t) {
  return {
    btn:(v="primary",ex={})=>({background:v==="primary"?t.accent:v==="danger"?t.danger:t.surface2,color:v==="secondary"?t.text:t.txtOnAccent,border:`1px solid ${v==="secondary"?t.border:"transparent"}`,borderRadius:8,padding:"8px 14px",cursor:"pointer",fontFamily:t.body,fontSize:13,fontWeight:600,...ex}),
    inp:(ex={})=>({background:t.surface2,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 12px",fontFamily:t.body,fontSize:14,width:"100%",boxSizing:"border-box",outline:"none",...ex}),
    card:(ex={})=>({background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:16,...ex}),
    tcard:(ex={})=>({background:t.surface,border:`1px solid ${t.tableBorder||t.border}`,borderRadius:12,padding:0,overflow:"hidden",...ex}),
    lbl:{fontSize:11,color:t.text2,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:"0.07em",fontFamily:t.body},
    h1:{fontFamily:t.font,fontSize:22,fontWeight:700,color:t.text,margin:0},
    h2:{fontFamily:t.font,fontSize:17,fontWeight:600,color:t.text,margin:"0 0 14px"},
    modal:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100},
    mbox:{background:t.surface,border:`1px solid ${t.border}`,borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto"},
  };
}

const { useState, useEffect, useRef } = React;
const e = React.createElement;

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function LoginScreen() {
  const t=THEMES.lotr, s=mkS(t);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [mode,setMode]=useState("login"); // "login" | "register"

  const submit=async()=>{
    if(!email.trim()||!pass.trim()){setErr("Compila email e password.");return;}
    setLoading(true);setErr("");
    try{
      if(mode==="login") await auth.signInWithEmailAndPassword(email.trim(),pass);
      else               await auth.createUserWithEmailAndPassword(email.trim(),pass);
    }catch(ex){
      const msgs={"auth/user-not-found":"Utente non trovato.","auth/wrong-password":"Password errata.","auth/email-already-in-use":"Email già registrata.","auth/weak-password":"Password troppo debole (min 6 caratteri).","auth/invalid-email":"Email non valida."};
      setErr(msgs[ex.code]||ex.message);
      setLoading(false);
    }
  };

  return e("div",{style:{minHeight:"100vh",background:t.bg,backgroundImage:t.bgImg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    e("div",{style:s.card({maxWidth:340,width:"100%",textAlign:"center"})},
      e("div",{style:{fontSize:48,marginBottom:12}},"🌿"),
      e("div",{style:{...s.h1,marginBottom:20,textAlign:"center"}},"PsycoTrack"),

      e("div",{style:{display:"flex",background:t.surface2,borderRadius:8,padding:3,marginBottom:20}},
        ...["login","register"].map(m=>e("button",{key:m,onClick:()=>{setMode(m);setErr("");},style:{flex:1,padding:"7px 0",borderRadius:6,border:"none",background:mode===m?t.accent:"transparent",color:mode===m?t.txtOnAccent:t.text2,cursor:"pointer",fontFamily:t.body,fontSize:13,fontWeight:mode===m?700:400,transition:"all .15s"}},m==="login"?"Accedi":"Registrati"))
      ),

      e("div",{style:{marginBottom:10,textAlign:"left"}},
        e("span",{style:s.lbl},"Email"),
        e("input",{type:"email",value:email,onChange:ev=>setEmail(ev.target.value),placeholder:"nome@email.com",style:s.inp(),onKeyDown:ev=>ev.key==="Enter"&&submit()})
      ),
      e("div",{style:{marginBottom:16,textAlign:"left"}},
        e("span",{style:s.lbl},"Password"),
        e("input",{type:"password",value:pass,onChange:ev=>setPass(ev.target.value),placeholder:"••••••••",style:s.inp(),onKeyDown:ev=>ev.key==="Enter"&&submit()})
      ),

      err&&e("p",{style:{color:t.danger,fontSize:13,marginBottom:12,fontFamily:t.body,textAlign:"left"}},err),

      e("button",{onClick:submit,disabled:loading,style:s.btn("primary",{width:"100%",padding:"11px 14px",fontSize:15})},
        loading?"…":mode==="login"?"🔑 Accedi":"✨ Registrati"
      )
    )
  );
}

}

// ─── SESSION ROW ─────────────────────────────────────────────────────────────
function SRow({sess,t,cost,onClick}) {

  const si=sess.attended===true?"✓":sess.attended===false?"✗":"·";
  const payable=sess.attended===true||(sess.attended===false&&sess.payAnyway);

    e("div",{style:{display:"flex",alignItems:"center",gap:10}},
      e("div",{style:{width:26,height:26,borderRadius:"50%",background:sc+"22",color:sc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}},si),
      e("div",null,
        e("div",{style:{fontSize:14,fontWeight:600,color:t.text}},fmtDate(sess.date)),
        sess.attended===false&&sess.reason&&e("div",{style:{fontSize:12,color:t.text2,marginTop:1}},sess.reason),
        sess.payAnyway&&e("div",{style:{fontSize:11,color:t.accent,marginTop:1}},"📌 Pagata comunque")

    e("div",{style:{fontFamily:t.font,fontWeight:700,color:payable?t.accent:t.text2,fontSize:14,flexShrink:0}},payable?`€${cost}`:"—")

}

  const [payAnyway,setPayAnyway]=useState(sess.payAnyway||false);
  const [confirmDel,setConfirmDel]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const payable=attended===true||(attended===false&&payAnyway);
  const doReset=()=>{setAttended(null);setReason("");setPayAnyway(false);setConfirmReset(false);};
  return e("div",{style:s.modal,onClick:onClose},
    e("div",{style:s.mbox,onClick:ev=>ev.stopPropagation()},
      e("div",{style:{...s.h2,marginBottom:4}},fmtDate(sess.date)),
      e("div",{style:{fontSize:13,color:t.text2,marginBottom:18}},`Costo: ${payable?`€${cost}`:"—"}`),
      e("div",{style:{marginBottom:14}},
        e("span",{style:s.lbl},"Seduta effettuata?"),
        e("div",{style:{display:"flex",gap:6}},
          ...[{v:true,l:"✓ Sì"},{v:false,l:"✗ No"},{v:null,l:"· N/D"}].map(o=>
            e("button",{key:String(o.v),onClick:()=>setAttended(o.v),style:s.btn("secondary",{flex:1,fontSize:12,padding:"7px 6px",background:attended===o.v?(o.v===true?t.success:o.v===false?t.danger:t.surface2):t.surface2,color:attended===o.v?"#fff":t.text2,borderColor:attended===o.v?"transparent":t.border})},o.l)
          )
        )
      ),
      attended===false&&e("div",null,
        e("div",{style:{marginBottom:10}},
          e("span",{style:s.lbl},"Motivo assenza"),
          e("input",{value:reason,onChange:ev=>setReason(ev.target.value),placeholder:"Es. malattia, impegno...",style:s.inp()})
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:16}},
          e("input",{type:"checkbox",id:"pa",checked:payAnyway,onChange:ev=>setPayAnyway(ev.target.checked),style:{width:16,height:16,cursor:"pointer",accentColor:t.accent}}),
          e("label",{htmlFor:"pa",style:{...s.lbl,margin:0,cursor:"pointer",textTransform:"none",letterSpacing:0,fontSize:14,color:t.text}},"Paga comunque")
        )
      ),
      confirmDel?e("div",{style:{background:t.danger+"18",border:`1px solid ${t.danger}55`,borderRadius:8,padding:12,marginTop:4}},
        e("div",{style:{fontSize:13,color:t.text,fontFamily:t.body,marginBottom:10}},"Eliminare questa seduta?"),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{style:s.btn("danger",{flex:1}),onClick:()=>onDelete(sess.id)},"Sì, elimina"),
          e("button",{style:s.btn("secondary",{flex:1}),onClick:()=>setConfirmDel(false)},"Annulla")
        )
      ):confirmReset?e("div",{style:{background:t.text2+"18",border:`1px solid ${t.border}`,borderRadius:8,padding:12,marginTop:4}},
        e("div",{style:{fontSize:13,color:t.text,fontFamily:t.body,marginBottom:10}},"Resettare i dati della seduta?"),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{style:s.btn("primary",{flex:1}),onClick:doReset},"Sì, resetta"),
          e("button",{style:s.btn("secondary",{flex:1}),onClick:()=>setConfirmReset(false)},"Annulla")
        )
      ):e("div",{style:{display:"flex",gap:8,marginTop:4}},
        e("button",{style:s.btn("primary",{flex:1}),onClick:()=>onSave({...sess,attended,reason,payAnyway})},"Salva"),
        e("button",{style:s.btn("secondary"),onClick:onClose},"Annulla"),
        e("button",{style:s.btn("secondary",{padding:"8px 10px"}),onClick:()=>setConfirmReset(true)},"↺"),
        e("button",{style:s.btn("danger"),onClick:()=>setConfirmDel(true)},"🗑")
      )
    )

}

// ─── HOME PAGE ───────────────────────────────────────────────────────────────
function HomePage({sessions,pid,cost,t,onNavigate}) {
  const s=mkS(t);
  const all=sessions.filter(x=>x.pid===pid);
  const byYear={};
  for(const x of all){
    const [y,m]=x.date.split("-").map(Number), mo=m-1;
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][mo])byYear[y][mo]={att:0,mis:0,pen:0,tot:0};
    const g=byYear[y][mo];
    if(x.attended===true){g.att++;g.tot+=cost;}
    else if(x.attended===false){g.mis++;if(x.payAnyway)g.tot+=cost;}
    else g.pen++;
  }
  const years=Object.keys(byYear).map(Number).sort((a,b)=>b-a);
  const yearRows=years.map(y=>{const ms=Object.values(byYear[y]);return{year:y,att:ms.reduce((s,g)=>s+g.att,0),mis:ms.reduce((s,g)=>s+g.mis,0),pen:ms.reduce((s,g)=>s+g.pen,0),tot:ms.reduce((s,g)=>s+g.tot,0)};});
  const grand=yearRows.reduce((s,r)=>({att:s.att+r.att,mis:s.mis+r.mis,pen:s.pen+r.pen,tot:s.tot+r.tot}),{att:0,mis:0,pen:0,tot:0});
  const thC={fontSize:10,color:t.text2,textTransform:"uppercase",letterSpacing:"0.03em",padding:"6px 6px",fontFamily:t.body,borderBottom:`1px solid ${t.border}`,background:t.surface2,whiteSpace:"nowrap"};
  const tdC=(color,align,bold,noBorder)=>({fontSize:13,color:color||t.text,padding:"8px 6px",textAlign:align||"center",fontFamily:t.body,fontWeight:bold?700:400,borderBottom:noBorder?"none":`1px solid ${t.border}`});
  return e("div",null,
    e("div",{style:{...s.lbl,marginBottom:8,color:t.accent,borderBottom:`1px solid ${t.accent}44`,paddingBottom:4}},"Riepilogo totale"),
    e("div",{style:s.tcard({marginBottom:28})},
      all.length===0
        ?e("div",{style:{padding:28,textAlign:"center",color:t.text2,fontSize:14,fontFamily:t.body}},"Nessuna seduta registrata")
        :e("table",{style:{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}},
            e("colgroup",null,e("col",{style:{width:"18%"}}),e("col",{style:{width:"20%"}}),e("col",{style:{width:"18%"}}),e("col",{style:{width:"20%"}}),e("col",{style:{width:"24%"}})),
            e("thead",null,e("tr",null,
              e("th",{style:{...thC,textAlign:"left",paddingLeft:10}},"Anno"),
              e("th",{style:{...thC,textAlign:"center"}},"Effett."),
              e("th",{style:{...thC,textAlign:"center"}},"Saltate"),
              e("th",{style:{...thC,textAlign:"center"}},"Da conf."),
              e("th",{style:{...thC,textAlign:"right",paddingRight:10}},"Costo")
            )),
            e("tbody",null,
              ...yearRows.map(r=>e("tr",{key:r.year},
                e("td",{style:{...tdC(t.accent,"left",true),paddingLeft:10}},r.year),
                e("td",{style:tdC(t.success)},r.att||"—"),
                e("td",{style:tdC(t.danger)},r.mis||"—"),
                e("td",{style:tdC(t.text2)},r.pen||"—"),
                e("td",{style:{...tdC(r.tot>0?t.accent:t.text2,"right",true),paddingRight:10}},r.tot>0?`€${r.tot}`:"—")
              )),
              e("tr",{style:{background:t.surface2}},
                e("td",{style:{...tdC(t.text,"left",true,true),paddingLeft:10}},"Totale"),
                e("td",{style:tdC(t.success,"center",true,true)},grand.att||"—"),
                e("td",{style:tdC(t.danger,"center",true,true)},grand.mis||"—"),
                e("td",{style:tdC(t.text2,"center",true,true)},grand.pen||"—"),
                e("td",{style:{...tdC(grand.tot>0?t.accent:t.text2,"right",true,true),paddingRight:10}},grand.tot>0?`€${grand.tot}`:"—")
              )
            )
          )
    ),
    years.length>0&&e("div",null,
      e("div",{style:{...s.lbl,marginBottom:8,color:t.accent,borderBottom:`1px solid ${t.accent}44`,paddingBottom:4}},"Dettaglio mensile"),
      ...years.map(year=>{
        const months=Object.keys(byYear[year]).map(Number).sort((a,b)=>b-a);
        return e("div",{key:year,style:s.tcard({marginBottom:12})},
          e("div",{style:{padding:"8px 14px",borderBottom:`1px solid ${t.border}`,background:t.surface2,borderLeft:`3px solid ${t.accent}`}},
            e("span",{style:{fontFamily:t.font,fontSize:15,fontWeight:700,color:t.accent}},year)
          ),
          e("table",{style:{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}},
            e("colgroup",null,e("col",{style:{width:"30%"}}),e("col",{style:{width:"16%"}}),e("col",{style:{width:"16%"}}),e("col",{style:{width:"16%"}}),e("col",{style:{width:"22%"}})),
            e("thead",null,e("tr",null,
              e("th",{style:{...thC,textAlign:"left",paddingLeft:10}},"Mese"),
              e("th",{style:{...thC,textAlign:"center"}},"✓"),
              e("th",{style:{...thC,textAlign:"center"}},"✗"),
              e("th",{style:{...thC,textAlign:"center"}},"·"),
              e("th",{style:{...thC,textAlign:"right",paddingRight:10}},"Costo")
            )),
            e("tbody",null,
              ...months.map((mo,i)=>{
                const g=byYear[year][mo],last=i===months.length-1;
                return e("tr",{key:mo,style:{cursor:"pointer"},onClick:()=>onNavigate(year,mo)},
                  e("td",{style:{...tdC(t.text,"left",true,last),paddingLeft:10}},MONTHS[mo]),
                  e("td",{style:tdC(t.success,"center",false,last)},g.att||"—"),

const RECUR_LABELS = {daily:"Giornaliero",weekly:"Settimanale",monthly:"Mensile",yearly:"Annuale"};

const DOC_DEFS = [
  {key:"idCard",       label:"Carta d'Identità",icon:"🪪",fields:[{key:"number",label:"Numero documento",ph:"Es. CA00000AA"},{key:"expiry",label:"Data scadenza",type:"date"}]},
  {key:"license",      label:"Patente",          icon:"🚗",fields:[{key:"number",label:"Numero patente",ph:"Es. U1A000000A"},{key:"expiry",label:"Data scadenza",type:"date"}]},
  {key:"carInspection",label:"Revisione Auto",   icon:"🔧",fields:[{key:"plate",label:"Targa",ph:"Es. AB123CD"},{key:"expiry",label:"Data revisione",type:"date"}]},
];

function expandBoundItem(item, horizonIso) {
  if(!item.recurrence) return [{id:item.id,date:item.date,title:item.title,note:item.note||"",itemId:item.id,recur:false}];
  const {freq,endDate}=item.recurrence;
  const end=endDate&&endDate<horizonIso?endDate:horizonIso;
  const entries=[];
  let d=new Date(item.date+"T12:00:00"), count=0;
  while(count<200){
    const iso=isoDate(d);
    if(iso>end) break;
    entries.push({id:`${item.id}_${iso}`,date:iso,title:item.title,note:item.note||"",itemId:item.id,recur:true,freq});
    count++;
    if(freq==="daily")        d.setDate(d.getDate()+1);
    else if(freq==="weekly")  d.setDate(d.getDate()+7);
    else if(freq==="monthly") d.setMonth(d.getMonth()+1);
    else if(freq==="yearly")  d.setFullYear(d.getFullYear()+1);
    else break;
  }
  return entries;
}

function getDocEntries(docs) {
  const entries=[];
  for(const def of DOC_DEFS){
    const doc=(docs||{})[def.key]||{};
    if(!doc.expiry) continue;
    entries.push({id:`doc_${def.key}`,date:doc.expiry,title:`${def.icon} Scadenza ${def.label}`,note:doc.number||doc.plate||"",isDoc:true,isWarning:false});
    const d30=new Date(doc.expiry+"T12:00:00"); d30.setDate(d30.getDate()-30);
    const warn=isoDate(d30);
    if(warn!==doc.expiry) entries.push({id:`doc_${def.key}_w30`,date:warn,title:`⚠️ ${def.label} scade tra 30 giorni`,note:"",isDoc:true,isWarning:true});
  }
  return entries;
}

// ─── BOUND: AGENDA VIEW ──────────────────────────────────────────────────────
function AgendaView({boundItems,boundDocs,t,done,onToggle,onDelete,onAdd}) {
  const s=mkS(t);
  const [showPast,setShowPast]=useState(false);
  const today=isoDate(new Date());
  const horizon=`${new Date().getFullYear()+1}-12-31`;

  const allManual=[];
  for(const item of boundItems) allManual.push(...expandBoundItem(item,horizon));
  const docEntries=getDocEntries(boundDocs);
  const all=[...allManual,...docEntries];

  const upcoming=all.filter(x=>x.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=allManual.filter(x=>x.date<today).sort((a,b)=>b.date.localeCompare(a.date));

  // group upcoming by month
  const grouped={};
  for(const entry of upcoming){
    const [y,m]=entry.date.split("-");
    const key=`${y}-${m}`;
    if(!grouped[key])grouped[key]=[];
    grouped[key].push(entry);
  }
  const groupKeys=Object.keys(grouped).sort();

  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      e("div",{style:s.h2},"📋 Agenda"),
      e("button",{style:s.btn(),onClick:onAdd},"+ Aggiungi")
    ),

    upcoming.length===0&&e("div",{style:s.card({textAlign:"center",color:t.text2,padding:32,fontSize:14,lineHeight:1.6,marginBottom:12})},
      "Nessun impegno in arrivo — aggiungi un impegno o inserisci le scadenze dei tuoi documenti"
    ),

    ...groupKeys.map(key=>{
      const [y,m]=key.split("-");
      const label=`${MONTHS[Number(m)-1]} ${y}`;
      return e("div",{key,style:{marginBottom:12}},
        e("div",{style:{fontSize:11,color:t.accent,textTransform:"uppercase",letterSpacing:"0.07em",fontFamily:t.body,borderBottom:`1px solid ${t.accent}44`,paddingBottom:4,marginBottom:8}},label),
        e("div",{style:{...s.tcard(),padding:"0 16px"}},
          ...grouped[key].map(entry=>e(BoundItemRow,{
            key:entry.id,entry,t,
            done:!!done[entry.id],
            onToggle:entry.isDoc?null:()=>onToggle(entry.id),
            onDelete:entry.isDoc||entry.recur?null:()=>onDelete(entry.itemId)
          }))
        )
      );
    }),

    past.length>0&&e("div",{style:{marginTop:8}},
      e("button",{style:s.btn("secondary",{width:"100%",fontSize:12}),onClick:()=>setShowPast(x=>!x)},
        showPast?`▲ Nascondi passati`:`▼ Mostra passati (${past.length})`
      ),
      showPast&&e("div",{style:{...s.tcard(),marginTop:8,padding:"0 16px"}},
        ...past.map(entry=>e(BoundItemRow,{
          key:entry.id,entry,t,
          done:!!done[entry.id],
          onToggle:()=>onToggle(entry.id),
          onDelete:entry.recur?null:()=>onDelete(entry.itemId)
        }))
      )
    )
  );
}

// ─── BOUND: DOCUMENTI VIEW ───────────────────────────────────────────────────
function DocumentiView({boundDocs,t,onSave}) {
  const s=mkS(t);
  const [docs,setDocs]=useState({idCard:{},license:{},carInspection:{},...(boundDocs||{})});
  const [flash,setFlash]=useState("");

  const setField=(docKey,field,val)=>setDocs(d=>({...d,[docKey]:{...(d[docKey]||{}),[field]:val}}));

  function expiryStatus(expiry) {
    if(!expiry) return null;
    const diff=Math.round((new Date(expiry+"T12:00:00")-new Date())/864e5);
    if(diff<0)  return {color:t.danger,  txt:`Scaduto ${-diff} giorni fa`};
    if(diff===0)return {color:t.danger,  txt:"Scade oggi"};
    if(diff<=30)return {color:t.danger,  txt:`Scade tra ${diff} giorni`};
    if(diff<=90)return {color:"#e67e22", txt:`Scade tra ${diff} giorni`};
    return       {color:t.success, txt:`Valido ancora ${diff} giorni`};
  }

  const doSave=()=>{onSave(docs);setFlash("saved");setTimeout(()=>setFlash(""),2200);};

  return e("div",null,
    e("div",{style:{...s.h2,marginBottom:8}},"📄 Documenti"),
    e("p",{style:{fontSize:13,color:t.text2,marginBottom:18,lineHeight:1.6}},
      "Inserisci i dati dei tuoi documenti. Le scadenze e i promemoria a 30 giorni appariranno automaticamente nell'Agenda."
    ),

    ...DOC_DEFS.map(def=>{
      const doc=(docs[def.key]||{});
      const st=expiryStatus(doc.expiry);
      return e("div",{key:def.key,style:s.card({marginBottom:12})},
        e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}},
          e("span",{style:{fontSize:20}},def.icon),
          e("span",{style:{fontFamily:t.font,fontSize:15,fontWeight:600,color:t.text}},def.label),
          st&&e("span",{style:{background:st.color+"22",color:st.color,border:`1px solid ${st.color}44`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}},st.txt)
        ),
        ...def.fields.map(f=>e("div",{key:f.key,style:{marginBottom:10}},
          e("span",{style:s.lbl},f.label),
          e("input",{type:f.type||"text",value:doc[f.key]||"",onChange:ev=>setField(def.key,f.key,ev.target.value),placeholder:f.ph||"",style:s.inp()})
        ))
      );
    }),

    e("button",{style:s.btn("primary",{width:"100%",marginTop:4}),onClick:doSave},
      flash==="saved"?"✓ Salvato!":"Salva documenti"
    )
  );
}

  const [boundDone,setBoundDone]   = useState({});

  const initialized = useRef(false);
  const currentData = useRef({});

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        setUser(u);
        const data=await loadData(u.uid);
        if(data){
          if(data.theme&&THEMES[data.theme])setTheme(data.theme);
          if(data.profiles)  setProfiles(data.profiles);
          if(data.sessions)  setSessions(data.sessions);
          if(data.pid)       setPid(data.pid);
          if(data.boundItems)setBoundItems(data.boundItems);
          if(data.boundDocs) setBoundDocs(data.boundDocs);
          if(data.boundDone) setBoundDone(data.boundDone);
          currentData.current=data;
        }
        initialized.current=true;
        setAuthState("in");
      }else{
        setUser(null);initialized.current=false;setAuthState("out");
      }
    });
    return unsub;
  },[]);

  const persist=(patch)=>{
    if(!initialized.current||!user) return;
    currentData.current={...currentData.current,...patch};
    setSyncStatus("saving");
    clearTimeout(persist._t);
    persist._t=setTimeout(()=>{
      db.collection("users").doc(user.uid).set(currentData.current)
        .then(()=>{setSyncStatus("saved");setTimeout(()=>setSyncStatus(""),2000);})
        .catch(()=>setSyncStatus("error"));
    },600);
  };

  useEffect(()=>{if(initialized.current)persist({theme});},[theme]);
  useEffect(()=>{if(initialized.current)persist({profiles});},[profiles]);
  useEffect(()=>{if(initialized.current)persist({sessions});},[sessions]);
  useEffect(()=>{if(initialized.current)persist({pid});},[pid]);
  useEffect(()=>{if(initialized.current)persist({boundItems});},[boundItems]);

        e("div",{style:{display:"flex",borderTop:`1px solid ${t.border}`}},
          ...[{id:"psyco",icon:"🧠",lbl:"PsycoTracker"},{id:"bound",icon:"📌",lbl:"Bound"}].map(tab=>
            e("button",{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{flex:1,padding:"8px 0",background:activeTab===tab.id?t.surface2:"transparent",border:"none",borderTop:`2px solid ${activeTab===tab.id?t.accent:"transparent"}`,color:activeTab===tab.id?t.accent:t.text2,cursor:"pointer",fontFamily:t.body,fontSize:12,fontWeight:activeTab===tab.id?700:400,display:"flex",alignItems:"center",justifyContent:"center",gap:5}},
              e("span",null,tab.icon)," ",tab.lbl
            )
          )
        )
      ),

      // ── Content
      activeTab==="bound"
        ?e(BoundTab,{boundItems,setBoundItems,boundDocs,setBoundDocs,boundDone,setBoundDone,t})
        :e("div",{style:{padding:16}},

          page==="home"&&e(HomePage,{sessions,pid,cost,t,onNavigate:(y,m)=>{setVy(y);setVm(m);setPage("sessions");}}),

          page==="sessions"&&e("div",null,
            e(MonthNav,{year:vy,month:vm,onPrev:prevMonth,onNext:nextMonth,t}),
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
              e("div",null,
                e("div",{style:{fontSize:11,color:t.text2,fontFamily:t.body,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}},`${mSess.length} sedute · ${mSess.filter(x=>x.attended||x.payAnyway).length} fatturabili`),
                e("div",{style:{fontFamily:t.font,fontSize:28,fontWeight:700,color:t.accent,lineHeight:1,textShadow:`0 0 18px ${t.accent}66`}},`€${mTotal}`)
              ),
              e("button",{style:s.btn(),onClick:()=>setModal({type:"addSess"})},"+ Aggiungi")
            ),
            mSess.length>0
              ?e("div",{style:s.tcard({padding:16})},...mSess.map(x=>e(SRow,{key:x.id,sess:x,t,cost,onClick:()=>setModal({type:"session",data:x})})))
              :e("div",{style:s.card({textAlign:"center",color:t.text2,padding:32,fontSize:14,lineHeight:1.6})},"Nessuna seduta — aggiungi manualmente o imposta un giorno ricorrente nel profilo")
          ),

          page==="profiles"&&e("div",null,
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
              e("div",{style:s.h2},"Profili"),
              e("button",{style:s.btn(),onClick:()=>setModal({type:"profile",data:{id:null,name:"",sessionCost:50,recurringDay:null}})},"+ Nuovo")
            ),
            ...profiles.map(p=>e("div",{key:p.id,style:s.card({marginBottom:8,borderColor:p.id===pid?t.accent:t.border,borderWidth:p.id===pid?2:1})},
              e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
                e("div",{style:{flex:1,minWidth:0}},
                  e("div",{style:{fontFamily:t.font,fontSize:15,fontWeight:600,color:t.text}},p.name),
                  e("div",{style:{fontSize:12,color:t.text2,marginTop:2}},`€${p.sessionCost}/sed. · ${p.recurringDay!=null?DAYS[p.recurringDay]:"Nessun ricorrente"}`),
                  p.id===pid&&e("div",{style:{fontSize:11,color:t.accent,marginTop:3}},"● attivo")
                ),
                e("div",{style:{display:"flex",gap:5,flexShrink:0}},
                  p.id!==pid&&e("button",{style:s.btn("secondary",{padding:"5px 9px",fontSize:11}),onClick:()=>setPid(p.id)},"Usa"),
                  e("button",{style:s.btn("secondary",{padding:"5px 9px",fontSize:11}),onClick:()=>setModal({type:"profile",data:p})},"✏️"),
                  profiles.length>1&&e("button",{style:s.btn("danger",{padding:"5px 9px",fontSize:11}),onClick:()=>{setProfiles(x=>x.filter(q=>q.id!==p.id));setSessions(x=>x.filter(q=>q.pid!==p.id));if(pid===p.id)setPid(profiles.find(q=>q.id!==p.id).id);}},"🗑")
                )
              )
            ))
          ),

          page==="settings"&&e("div",null,
            e("div",{style:s.h2},"Tema"),
            e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
              ...Object.entries(THEMES).map(([k,th])=>e("button",{key:k,onClick:()=>setTheme(k),style:{background:th.surface,border:`${theme===k?"2px":"1px"} solid ${theme===k?t.accent:t.border}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
                e("div",{style:{width:44,height:44,borderRadius:"50%",background:`conic-gradient(${th.accent} 0deg,${th.bg} 180deg,${th.surface2} 360deg)`,border:`2px solid ${th.border}`}}),
                e("span",{style:{fontFamily:th.font,fontSize:13,color:th.text,textAlign:"center"}},th.name),
                theme===k&&e("span",{style:{fontSize:10,color:th.accent}},"● attivo")
              ))
            )
          )
        )
    ),

    // PsycoTracker bottom nav
    activeTab==="psyco"&&e("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",background:t.surface,borderTop:`1px solid ${t.border}`,display:"flex",width:"100%",maxWidth:480,zIndex:10}},
      ...PSYCO_NAV.map(n=>e("button",{key:n.id,onClick:()=>setPage(n.id),style:{flex:1,padding:"10px 0",background:page===n.id?t.surface2:"transparent",border:"none",borderTop:`2px solid ${page===n.id?t.accent:"transparent"}`,color:page===n.id?t.accent:t.text2,cursor:"pointer",fontFamily:t.body,fontSize:10,fontWeight:page===n.id?700:400,display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
        e("span",{style:{fontSize:18}},n.icon),n.lbl
      ))
    ),

    // Modals
    modal&&modal.type==="session" &&e(SessionModal,{sess:modal.data,t,cost,onSave:d=>{setSessions(p=>p.map(x=>x.id===d.id?d:x));closeModal();},onDelete:id=>{setSessions(p=>p.filter(x=>x.id!==id));closeModal();},onClose:closeModal}),
    modal&&modal.type==="addSess"&&e(AddModal,{t,pid,onSave:d=>{setSessions(p=>[...p,d]);closeModal();},onClose:closeModal}),
    modal&&modal.type==="profile"&&e(ProfileModal,{data:modal.data,t,onSave:d=>{if(d.id)setProfiles(p=>p.map(x=>x.id===d.id?d:x));else{const np={...d,id:uid()};setProfiles(p=>[...p,np]);if(!pid)setPid(np.id);}closeModal();},onClose:closeModal}),
    modal&&modal.type==="account"&&e("div",{style:s.modal,onClick:closeModal},
      e("div",{style:s.mbox,onClick:ev=>ev.stopPropagation()},
        e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
          e("div",{style:{width:48,height:48,borderRadius:"50%",background:t.surface2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}},"👤"),
          e("div",null,
            e("div",{style:{fontFamily:t.font,fontSize:16,fontWeight:600,color:t.text}},user?user.email:""),
            e("div",{style:{fontSize:12,color:t.text2,marginTop:2}},user?user.uid.slice(0,8)+"…":"")
          )
        ),
        e("button",{style:s.btn("danger",{width:"100%"}),onClick:()=>{auth.signOut();closeModal();}},"Disconnetti")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
}); // end window.addEventListener('load')
</script>
</body>
</html>
